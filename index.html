    // ==========================================
    // 2. 구글 시트 API 연동 서비스
    // ==========================================
    const apiService = {
      saveRecord: async (userId, round, data) => {
        // ★ 여기에 선생님이 발급받은 구글 앱스 스크립트 URL을 따옴표 안에 넣으세요! ★
        // 예시: const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxbPp8VS-uuH2vbrEm-yxbTq9CJdH-EGhNzAoA9pFFTdgtjPQR5t_sPZXlT4epPOO58/exec";
        const SCRIPT_URL = "여기에_선생님의_구글앱스스크립트_URL을_붙여넣으세요";
        
        // URL이 입력되지 않았을 경우 테스트 모드로 작동
        if (SCRIPT_URL === "여기에_선생님의_구글앱스스크립트_URL을_붙여넣으세요" || SCRIPT_URL === "") {
          console.log(`[테스트 모드] 사용자:${userId}, 라운드:${round} 완료 (시트 URL 미설정)`, data);
          return new Promise(resolve => setTimeout(resolve, 500));
        }

        try {
          console.log("구글 시트로 데이터 전송 중...");
          await fetch(SCRIPT_URL, {
            method: "POST",
            redirect: "follow", // 구글 앱스 스크립트의 리다이렉트를 정상적으로 처리하기 위한 필수 옵션
            // CORS 에러 방지를 위해 text/plain 속성 사용
            headers: {
              "Content-Type": "text/plain;charset=utf-8",
            },
            body: JSON.stringify({
              userId: userId,
              name: data.name,
              round: round,
              totalAssets: data.totalAssets
            })
          });
          console.log(`[구글 시트 저장 성공] 라운드 ${round}`);
        } catch (error) {
          console.error("구글 시트 저장 실패:", error);
        }
      }
    };

    // ==========================================
    // 3. 메인 앱 컴포넌트
    // ==========================================
    function App() {
      const [screen, setScreen] = useState('login'); 
      const [user, setUser] = useState({ id: '', name: '' });
      const [roundIndex, setRoundIndex] = useState(0);
      
      const [cash, setCash] = useState(GAME_DATA.initialCapital);
      const [currentInvestment, setCurrentInvestment] = useState({ portfolio: {}, remainingCash: 0, savings: 0 });
      const [history, setHistory] = useState([{ round: '시작', assets: GAME_DATA.initialCapital }]);

      const currentRound = GAME_DATA.rounds[roundIndex];
      const formatMoney = (amount) => amount.toLocaleString() + '원';

      const handleInvestComplete = (portfolio, remainingCash, savings) => {
        setCurrentInvestment({ portfolio, remainingCash, savings });
        setScreen('result');
      };

      const handleNextRound = async (finalAssets) => {
        const nextRoundNumber = roundIndex + 1;
        const isGameOver = nextRoundNumber >= GAME_DATA.rounds.length;

        const newHistory = [...history, { 
          round: currentRound.eraName.split(' ')[0], 
          assets: finalAssets 
        }];
        setHistory(newHistory);

        // 시트에 데이터 저장 비동기 호출
        await apiService.saveRecord(user.id, nextRoundNumber, {
          name: user.name,
          totalAssets: finalAssets,
          portfolio: currentInvestment.portfolio
        });

        setCash(finalAssets);

        if (!isGameOver) {
          setRoundIndex(nextRoundNumber);
          setScreen('news');
        } else {
          setScreen('final');
        }
      };

      return (
        <div className="min-h-screen bg-slate-100 font-sans text-slate-800 flex items-center justify-center p-0 sm:p-4">
          <div className="w-full max-w-md bg-white sm:rounded-3xl shadow-xl overflow-hidden flex flex-col h-[100dvh] sm:h-[85vh] sm:max-h-[800px]">
            {screen !== 'login' && (
              <div className="bg-indigo-600 text-white p-4 flex justify-between items-center shrink-0 shadow-md z-10">
                <div>
                  <p className="text-xs text-indigo-200">투자자</p>
                  <p className="font-bold">{user.name} 님</p>
                </div>
                <div className="text-right">
                  <p className="text-xs text-indigo-200">투자 가능 현금</p>
                  <p className="font-bold text-yellow-300">
                    {screen === 'invest' ? formatMoney(cash) : (screen === 'result' || screen === 'final' ? '정산중...' : formatMoney(cash))}
                  </p>
                </div>
              </div>
            )}

            <div className="flex-1 overflow-y-auto relative bg-slate-50 flex flex-col">
              {screen === 'login' && <LoginScreen setUser={setUser} setScreen={setScreen} />}
              {screen === 'news' && <NewsScreen round={currentRound} setScreen={setScreen} />}
              {screen === 'invest' && (
                <InvestScreen 
                  round={currentRound} 
                  totalCash={cash}
                  onInvestComplete={handleInvestComplete}
                  formatMoney={formatMoney}
                />
              )}
              {screen === 'result' && (
                <ResultScreen 
                  round={currentRound}
                  investment={currentInvestment}
                  onNext={handleNextRound}
                  formatMoney={formatMoney}
                  isLastRound={roundIndex === GAME_DATA.rounds.length - 1}
                  history={history}
                />
              )}
              {screen === 'final' && (
                <FinalScreen 
                  history={history} 
                  user={user} 
                  formatMoney={formatMoney}
                  finalAssets={cash}
                />
              )}
            </div>
          </div>
        </div>
      );
    }

    // ==========================================
    // 화면 1: 로그인 및 대기실
    // ==========================================

      const [num, setNum] = useState('');

        <div className="p-8 flex flex-col h-full justify-center items-center text-center bg-gradient-to-b from-blue-50 to-indigo-100">
          <div className="text-6xl mb-4">🚀</div>
          <h1 className="text-2xl font-black text-indigo-900 mb-2 leading-tight">
            대한민국 경제성장<br/><span className="text-blue-600">주식 레이스</span>
          </h1>
          <p className="text-slate-600 mb-8 text-sm">1960년대부터 미래까지!<br/>최고의 투자자가 되어보세요.</p>
          
          <div className="w-full space-y-4 relative">
            {errorMsg && (
              <div className="absolute -top-12 left-1/2 transform -translate-x-1/2 bg-red-600 text-white px-4 py-2 rounded-full font-bold shadow-lg animate-bounce whitespace-nowrap w-full text-sm">
                {errorMsg}
              </div>
            )}
            <input 
              type="number" 
              placeholder="학번 (예: 60101)" 
              className="w-full p-4 rounded-xl border-2 border-indigo-200 focus:border-indigo-500 focus:outline-none text-lg text-center font-bold"
              value={num}

            <input

              className="w-full p-4 rounded-xl border-2 border-indigo-200 focus:border-indigo-500 focus:outline-none text-lg text-center font-bold"

            <button

            >

    // ==========================================
    // 화면 2: 시대별 뉴스 브리핑 (힌트)
    // ==========================================
    function NewsScreen({ round, setScreen }) {
      return (
        <div className="p-6 flex flex-col min-h-full bg-slate-800 text-white animate-fade-in">

              🦜
            </div>
            
            <h3 className="text-center font-bold text-lg mt-4 mb-4 text-indigo-600">

            <p className="text-lg leading-relaxed font-medium bg-indigo-50 p-4 rounded-xl border border-indigo-100 whitespace-pre-line">

    // ==========================================
    // 화면 3: 투자 입력 화면
    // ==========================================
    function InvestScreen({ round, totalCash, onInvestComplete, formatMoney }) {
      const [localPortfolio, setLocalPortfolio] = useState({});
      const [localSavings, setLocalSavings] = useState(0);
      const [errorMsg, setErrorMsg] = useState('');

      useEffect(() => {
        const initPort = {};
        round.stocks.forEach(s => initPort[s.id] = 0);
        setLocalPortfolio(initPort);
      }, [round]);

      const currentTotalCost = useMemo(() => {
        let cost = localSavings;
        Object.keys(localPortfolio).forEach(stockId => {
          const stockInfo = round.stocks.find(s => s.id === stockId);
          if(stockInfo) {
             cost += (localPortfolio[stockId] || 0) * stockInfo.currentPrice;
          }
        });
        return cost;
      }, [localPortfolio, localSavings, round.stocks]);

      const remainingCash = totalCash - currentTotalCost;
      const isOverBudget = remainingCash < 0;

      const triggerError = () => {
        setErrorMsg('현금이 부족해요!');
        setTimeout(() => setErrorMsg(''), 1500);
      };

      const handleStockChange = (stockId, delta) => {
        const stockInfo = round.stocks.find(s => s.id === stockId);
        const currentQty = localPortfolio[stockId] || 0;
        let newQty = currentQty + delta;
        
        if (newQty < 0) {
          delta = -currentQty;
          newQty = 0;
        }
        
        if (delta > 0) {
          const addedCost = stockInfo.currentPrice * delta;
          if (remainingCash - addedCost < 0) {
            const maxAffordableQty = Math.floor(remainingCash / stockInfo.currentPrice);
            if (maxAffordableQty > 0) {
              delta = maxAffordableQty;
              newQty = currentQty + delta;
            } else {
              triggerError();
              return;
            }
          }
        }
        
        if (delta === 0) return;

        setLocalPortfolio(prev => ({...prev, [stockId]: newQty}));
        setErrorMsg('');
      };

      const handleSavingsChange = (amount) => {
        const newSavings = localSavings + amount;
        if (newSavings < 0) return;
        if (amount > 0 && remainingCash - amount < 0) {
          triggerError();
          return;
        }
        setLocalSavings(newSavings);
        setErrorMsg('');
      };

      const handleMaxStock = (stockId) => {
          const stockInfo = round.stocks.find(s => s.id === stockId);
          const maxAffordableQty = Math.floor(remainingCash / stockInfo.currentPrice);
          if(maxAffordableQty > 0) {
              setLocalPortfolio(prev => ({...prev, [stockId]: (prev[stockId] || 0) + maxAffordableQty}));
          } else {
              triggerError();
          }
      };

      const handleSellAll = () => {
        const emptyPortfolio = {};
        round.stocks.forEach(s => emptyPortfolio[s.id] = 0);
        setLocalPortfolio(emptyPortfolio);
        setLocalSavings(0);
        setErrorMsg('');
      };

      const handleComplete = () => {
        if (isOverBudget) return;
        onInvestComplete(localPortfolio, remainingCash, localSavings);
      };

      return (
        <div className="flex flex-col min-h-full bg-slate-50 animate-slide-up">
          <div className={`sticky top-0 p-4 shrink-0 transition-colors duration-300 ${isOverBudget ? 'bg-red-500' : 'bg-white shadow-sm'} z-20 rounded-b-3xl border-b border-slate-200`}>
            <div className="flex justify-between items-center mb-2">
              <span className="text-sm font-bold text-slate-500">💰 남은 투자 가능 금액</span>
              <button 
                onClick={handleSellAll}
                className="text-xs bg-red-100 text-red-600 font-bold px-3 py-1 rounded-full shadow-sm hover:bg-red-200 active:scale-95 transition"
              >
                초기화 (전체 취소)
              </button>
            </div>
            <div className={`text-3xl font-black ${isOverBudget ? 'text-white' : 'text-blue-600'}`}>
              {formatMoney(remainingCash)}
            </div>
            {errorMsg && (
              <div className="absolute top-full left-1/2 transform -translate-x-1/2 mt-2 bg-red-600 text-white text-sm px-4 py-2 rounded-full font-bold shadow-lg animate-bounce whitespace-nowrap">
                {errorMsg}
              </div>
            )}
          </div>

          <div className="p-4 flex-1 pb-4 space-y-3">
            <div className="bg-indigo-50 text-indigo-700 text-xs text-center p-2 rounded font-bold mb-4">
              💡 이전 시대의 자산이 현금화되었습니다. 8개 종목 중 잘 골라 분배하세요!
            </div>

            <div className="bg-green-50 rounded-2xl p-4 border-2 border-green-200 flex justify-between items-center shadow-sm">
              <div>
                <div className="flex items-center gap-2">
                  <span className="text-2xl">🏦</span>
                  <h3 className="font-bold text-green-900 text-lg">은행 저축</h3>
                </div>
                <p className="text-xs text-green-700 font-bold bg-green-200 inline-block px-2 py-1 rounded mt-1">
                  확정 이자율: {round.interestRate * 100}%
                </p>
              </div>
              <div className="flex flex-col items-end">
                <div className="font-bold text-slate-700 mb-1">{formatMoney(localSavings)}</div>
                <div className="flex gap-1 bg-white rounded-full p-1 border border-green-300 shadow-sm">
                  <button onClick={() => handleSavingsChange(-10000)} className="w-9 h-9 flex items-center justify-center rounded-full bg-slate-100 text-slate-600 font-bold text-xs hover:bg-slate-200">-1만</button>
                  <button onClick={() => handleSavingsChange(10000)} className="w-9 h-9 flex items-center justify-center rounded-full bg-green-500 text-white font-bold text-xs hover:bg-green-600">+1만</button>
                  <button onClick={() => handleSavingsChange(remainingCash)} className="w-9 h-9 flex items-center justify-center rounded-full bg-green-700 text-white font-bold text-[11px] hover:bg-green-800">ALL</button>
                </div>
              </div>
            </div>

            {round.stocks.map(stock => {
              const qty = localPortfolio[stock.id] || 0;
              return (
                <div key={stock.id} className="bg-white rounded-2xl p-3 border border-slate-200 shadow-sm flex justify-between items-center">
                  <div className="flex-1 min-w-0 pr-2">
                    <div className="flex items-center gap-1 mb-1">
                      <span className="text-[10px] font-bold text-blue-500 bg-blue-50 px-1.5 py-0.5 rounded truncate">{stock.category}</span>
                    </div>
                    <h3 className="font-black text-slate-800 text-base leading-tight truncate">{stock.id}</h3>
                    <p className="text-[11px] text-slate-500 mb-1 truncate">{stock.desc}</p>
                    <div className="text-xs font-bold text-slate-700 bg-slate-100 inline-block px-1.5 py-0.5 rounded">
                      1주: {formatMoney(stock.currentPrice)}
                    </div>
                  </div>

                  <div className="flex flex-col items-end shrink-0">
                     <div className="font-bold text-indigo-600 mb-1 text-sm">{qty}주</div>
                     <div className="flex gap-0.5 bg-slate-50 rounded-full p-1 border border-slate-200 shadow-inner">
                        <button onClick={() => handleStockChange(stock.id, -10)} className="w-7 h-7 flex items-center justify-center rounded-full bg-white text-slate-500 font-bold shadow-sm hover:bg-slate-100 text-[10px]">-10</button>
                        <button onClick={() => handleStockChange(stock.id, -1)} className="w-7 h-7 flex items-center justify-center rounded-full bg-white text-slate-500 font-bold shadow-sm hover:bg-slate-100 text-base">-</button>
                        <button onClick={() => handleStockChange(stock.id, 1)} className="w-7 h-7 flex items-center justify-center rounded-full bg-indigo-500 text-white font-bold shadow-sm hover:bg-indigo-600 text-base">+</button>
                        <button onClick={() => handleStockChange(stock.id, 10)} className="w-7 h-7 flex items-center justify-center rounded-full bg-indigo-600 text-white font-bold shadow-sm hover:bg-indigo-700 text-[10px]">+10</button>
                        <button onClick={() => handleMaxStock(stock.id)} className="w-7 h-7 flex items-center justify-center rounded-full bg-indigo-800 text-white font-bold text-[10px] shadow-sm hover:bg-indigo-900">최대</button>
                     </div>
                  </div>
                </div>
              )
            })}
          </div>

          <div className="sticky bottom-0 w-full p-4 bg-white border-t border-slate-200 mt-auto z-30">
            <button 
              onClick={handleComplete}
              disabled={isOverBudget}
              className={`w-full p-4 rounded-xl text-xl font-black shadow-lg transition-all ${
                isOverBudget 
                  ? 'bg-slate-300 text-slate-500 cursor-not-allowed' 
                  : 'bg-indigo-600 text-white hover:bg-indigo-700 active:scale-95'
              }`}
            >
              {isOverBudget ? '현금 초과! 줄여주세요' : '투자 완료 (결과 보기)'}
            </button>
          </div>
        </div>
      );
    }

    // ==========================================
    // 화면 4: 라운드 투자 결과 및 피드백
    // ==========================================
    function ResultScreen({ round, investment, onNext, formatMoney, isLastRound, history }) {
      const [showAnimation, setShowAnimation] = useState(false);
      const { portfolio, remainingCash, savings } = investment;

      useEffect(() => {
        setTimeout(() => setShowAnimation(true), 300);
      }, []);

      const interestEarned = Math.floor(savings * round.interestRate);
      const finalSavings = savings + interestEarned;
      
      let stocksNewValue = 0;
      round.stocks.forEach(stock => {
          const qty = portfolio[stock.id] || 0;
          stocksNewValue += (qty * stock.nextPrice);
      });

      const finalAssets = remainingCash + finalSavings + stocksNewValue;
      const previousAssets = history[history.length - 1].assets;
      const profitMargin = ((finalAssets - previousAssets) / previousAssets) * 100;
      const isProfit = profitMargin >= 0;

      return (
        <div className={`min-h-full p-6 flex flex-col ${isProfit ? 'bg-red-50' : 'bg-blue-50'}`}>
          {showAnimation && isProfit && (
            <div className="absolute top-0 left-0 w-full h-full pointer-events-none overflow-hidden flex justify-center z-0 opacity-50">
              <div className="text-6xl animate-bounce mt-10">🎉🚀📈💰</div>
            </div>
          )}
          {showAnimation && !isProfit && (
            <div className="absolute top-0 left-0 w-full h-full pointer-events-none overflow-hidden flex justify-center z-0 opacity-50">
              <div className="text-6xl animate-pulse mt-10">🌧️📉😭</div>
            </div>
          )}

          <div className="relative z-10 text-center mt-4 mb-6">
            <h2 className="text-2xl font-black text-slate-800 mb-2">투자 결과 발표</h2>
            <div className="bg-white rounded-2xl p-6 shadow-xl border-4 border-white inline-block w-full">
              <p className="text-slate-500 text-sm mb-1">시대 종료 후 내 총 자산</p>
              <div className="text-4xl font-black text-slate-800 mb-2">
                {formatMoney(finalAssets)}
              </div>
              <div className={`text-xl font-bold flex items-center justify-center gap-1 ${isProfit ? 'text-red-500' : 'text-blue-500'}`}>
                {isProfit ? '▲' : '▼'} {Math.abs(profitMargin).toFixed(1)}%
              </div>
            </div>
          </div>

          <div className="bg-white rounded-2xl p-5 shadow-lg mb-6 relative z-10 border-t-4 border-indigo-500">
            <div className="flex items-center gap-2 mb-2">
              <span className="text-xl">📚</span>
              <h3 className="font-bold text-indigo-900">{round.historicalFeedback.title}</h3>
            </div>
            <p className="text-slate-600 text-sm leading-relaxed font-medium">
              {round.historicalFeedback.content}
            </p>
          </div>

          <div className="bg-slate-100 rounded-2xl p-4 mb-6 relative z-10 flex-1">
            <h4 className="font-bold text-slate-700 mb-3 text-sm">이 시대의 실제 기업 성적표</h4>
            <div className="grid grid-cols-2 gap-2 mb-2">
                 {round.stocks.map(stock => {
                   const qty = portfolio[stock.id] || 0;
                   const percentChange = ((stock.nextPrice - stock.currentPrice) / stock.currentPrice) * 100;
                   const isUp = percentChange > 0;
                   const hasInvested = qty > 0;

                   return (
                     <div key={stock.id} className={`p-2 rounded-xl shadow-sm border ${hasInvested ? 'bg-white border-indigo-300 ring-1 ring-indigo-200' : 'bg-slate-50 border-slate-200 opacity-70'}`}>
                       <div className="flex justify-between items-center mb-1">
                         <span className="font-bold text-slate-800 text-xs truncate mr-1">{stock.id}</span>
                         <span className={`font-black text-xs ${isUp ? 'text-red-500' : 'text-blue-500'}`}>
                           {isUp ? '+' : ''}{percentChange.toFixed(0)}%
                         </span>
                       </div>
                       <div className="flex justify-between items-center mt-1">
                         {hasInvested ? (
                            <span className="font-bold text-indigo-600 bg-indigo-50 px-1.5 py-0.5 rounded text-[10px]">
                              {qty}주 보유
                            </span>
                         ) : (
                            <span className="text-[10px] text-slate-400">투자 안함</span>
                         )}
                       </div>
                     </div>
                   )
                 })}
            </div>
            
            <div className={`p-3 mt-3 rounded-xl shadow-sm border ${savings > 0 ? 'bg-white border-green-300 ring-1 ring-green-200' : 'bg-slate-50 border-slate-200 opacity-70'}`}>
                <div className="flex justify-between items-center mb-1">
                     <span className="font-bold text-slate-800 text-sm">은행 저축</span>
                     <span className="font-black text-green-600">+{round.interestRate * 100}%</span>
                </div>
                <div className="flex justify-between items-center text-xs">
                     <span className="text-slate-500">확정 이자 수익</span>
                     {savings > 0 ? (
                        <span className="font-bold text-green-700 bg-green-50 px-2 py-0.5 rounded">
                          +{formatMoney(interestEarned)} 획득
                        </span>
                     ) : (
                        <span className="text-slate-400">저축 안함</span>
                     )}
                </div>
            </div>
          </div>

          <div className="mt-auto sticky bottom-0 pt-4 pb-2 z-20">
            <button 
              onClick={() => onNext(finalAssets)}
              className="w-full bg-indigo-600 text-white p-4 rounded-xl text-xl font-black hover:bg-indigo-700 transition shadow-lg active:scale-95 flex flex-col items-center leading-tight"
            >
              <span>{isLastRound ? '최종 결과 보기 🏆' : '전액 현금화 후 다음 시대로 ⏳'}</span>
            </button>
          </div>
        </div>
      );
    }

    // ==========================================
    // 화면 5: 최종 리포트 및 랭킹
    // ==========================================
    function FinalScreen({ history, user, formatMoney, finalAssets }) {
      const maxAsset = Math.max(...history.map(h => h.assets));
      const minAsset = Math.min(...history.map(h => h.assets));
      const chartHeight = 150;
      const chartWidth = 300; 
      
      const getPoint = (index, value) => {
        const x = (index / (history.length - 1)) * chartWidth;
        const y = chartHeight - ((value - minAsset) / (maxAsset - minAsset || 1)) * chartHeight * 0.8 - 10;
        return `${x},${y}`;
      };

      const polylinePoints = history.map((h, i) => getPoint(i, h.assets)).join(' ');
      const profitRate = ((finalAssets - GAME_DATA.initialCapital) / GAME_DATA.initialCapital) * 100;

      return (
        <div className="min-h-full p-6 flex flex-col bg-slate-900 text-white">
          <div className="text-center mt-8 mb-6 animate-slide-up">
            <div className="text-6xl mb-4">👑</div>
            <h2 className="text-3xl font-black text-yellow-400 mb-2">최종 결과 보고서</h2>
            <p className="text-slate-300">수고하셨습니다, {user.name} 투자자님!</p>
          </div>

          <div className="bg-slate-800 rounded-3xl p-6 shadow-2xl mb-8 animate-fade-in border border-slate-700">
            <p className="text-slate-400 text-sm text-center mb-1">최종 자산</p>
            <div className="text-4xl font-black text-white text-center mb-2">
              {formatMoney(finalAssets)}
            </div>
            <div className={`text-lg font-bold text-center mb-6 ${profitRate >= 0 ? 'text-red-400' : 'text-blue-400'}`}>
              원금 대비 {profitRate > 0 ? '+' : ''}{profitRate.toFixed(1)}%
            </div>

            <div className="mt-4 bg-slate-900 rounded-xl p-4 border border-slate-700">
              <p className="text-xs text-slate-500 mb-2 text-center">시대별 자산 변화 그래프</p>
              <svg viewBox={`-10 -10 ${chartWidth + 20} ${chartHeight + 20}`} className="w-full h-32 overflow-visible">
                <line x1="0" y1={chartHeight} x2={chartWidth} y2={chartHeight} stroke="#475569" strokeWidth="1" />
                <polyline 
                  fill="none" 
                  stroke="#fbbf24" 
                  strokeWidth="4" 
                  strokeLinecap="round"
                  strokeLinejoin="round"
                  points={polylinePoints} 
                />
                {history.map((h, i) => {
                  const [x, y] = getPoint(i, h.assets).split(',');
                  return (
                    <g key={i}>
                      <circle cx={x} cy={y} r="4" fill="#fbbf24" stroke="#1e293b" strokeWidth="2" />
                      {i === history.length - 1 && (
                         <text x={x} y={y - 15} fill="white" fontSize="12" textAnchor="end" fontWeight="bold">
                            {Math.floor(h.assets / 10000)}만
                         </text>
                      )}
                    </g>
                  )
                })}
              </svg>
              <div className="flex justify-between mt-2 text-[10px] text-slate-500 px-1">
                 <span>시작</span>
                 <span>IMF</span>
                 <span>미래</span>
              </div>
            </div>
          </div>

          <div className="bg-indigo-600 rounded-2xl p-6 shadow-lg mb-8 text-center">
            <h3 className="font-bold text-xl mb-2 text-white">학급 랭킹을 확인해보세요!</h3>
            <p className="text-indigo-200 text-sm mb-4">
              여러분의 투자 결과가 선생님의 모니터로 전송되었습니다. 칠판의 순위표를 확인하세요!
            </p>
            <div className="text-4xl animate-pulse">📊</div>
          </div>

          <div className="mt-auto sticky bottom-0 pt-4 pb-2 bg-slate-900 z-20">
            <button 
              onClick={() => window.location.reload()}
              className="w-full bg-slate-700 text-white p-4 rounded-xl text-lg font-bold hover:bg-slate-600 transition shadow-lg active:scale-95"
            >
              처음부터 다시하기 🔄
            </button>
          </div>
        </div>
      );
    }

    // 최상위 렌더링
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
